syntax = "proto3";

// ConnectRPC / gRPC surface for the Nitro human-translation API.
//
// Mirrors the production REST API documented at
// https://developer.nitrotranslate.com/ (base URL
// https://api.nitrotranslate.com/v1, HTTP Basic auth with the API key as the
// username and a blank password). The wire shapes here match the existing
// production JSON 1:1, so enum-like fields are modeled as strings constrained
// with protovalidate `string.in` rather than proto enums (whose JSON would
// serialize differently). Each RPC carries a google.api.http annotation
// describing the equivalent REST route for gRPC transcoding.
package nitrotranslate.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/alconost/nitrotranslate/proto/gen/nitrotranslate/v1;nitrotranslatev1";

// NitroService exposes account, ordering, pricing and translation operations.
service NitroService {
  // GET /account — retrieve account details (balance and reserved funds).
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse) {
    option (google.api.http) = {
      get: "/v1/account"
      response_body: "account"
    };
  }

  // GET /orders — list orders, newest first by default, with pagination.
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse) {
    option (google.api.http) = {
      get: "/v1/orders"
      response_body: "orders"
    };
  }

  // GET /orders/<ID> — fetch a single order with its full details.
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse) {
    option (google.api.http) = {
      get: "/v1/orders/{id}"
      response_body: "order"
    };
  }

  // DELETE /orders/<ID> — remove an order (only while in QUEUE status).
  rpc DeleteOrder(DeleteOrderRequest) returns (DeleteOrderResponse) {
    option (google.api.http) = {
      delete: "/v1/orders/{id}"
    };
  }

  // POST /calculate — estimate translation cost per target language.
  rpc Calculate(CalculateRequest) returns (CalculateResponse) {
    option (google.api.http) = {
      post: "/v1/calculate"
      body: "*"
      response_body: "calculations"
    };
  }

  // POST /translate — submit content for translation and create orders.
  rpc Translate(TranslateRequest) returns (TranslateResponse) {
    option (google.api.http) = {
      post: "/v1/translate"
      body: "*"
    };
  }

  // GET /rates — current pricing rates for all supported language pairs.
  rpc ListRates(ListRatesRequest) returns (ListRatesResponse) {
    option (google.api.http) = {
      get: "/v1/rates"
      response_body: "rates"
    };
  }
}

// ---------------------------------------------------------------------------
// Shared messages
// ---------------------------------------------------------------------------

// Account balance information.
message Account {
  int64 id = 1;
  // Whether the account is allowed to go into overdraft.
  bool balance_overdraft_allowed = 2;
  // Funds currently reserved by in-flight orders, in US dollars.
  double reserved = 3;
  // Available balance, in US dollars.
  double balance = 4;
}

// The content to be translated. `data` is interpreted according to its MIME
// `type` (e.g. text/plain, text/html, application/json).
message Resource {
  // MIME type of the resource, e.g. "text/html".
  string type = 1 [(buf.validate.field).required = true];
  // The resource payload.
  string data = 2 [(buf.validate.field).required = true];
  // Optional caller-defined metadata echoed back on the order.
  optional string metadata = 3;
}

// Translation hints applied to an order. All fields are optional.
message Context {
  // Tone of voice: FORMAL, INFORMAL, or GUESS (let the translator decide).
  optional string tone = 1 [(buf.validate.field).string = {
    in: ["FORMAL", "INFORMAL", "GUESS"]
  }];
  // Maximum number of characters allowed in the translation.
  optional int32 limit = 2 [(buf.validate.field).int32.gte = 0];
  // Subject-matter category guiding terminology.
  optional string category = 3 [(buf.validate.field).string = {
    in: [
      "APPS",
      "CRYPTO",
      "CASINO",
      "LEGAL",
      "E_COMMERCE",
      "FINANCE",
      "GAMES",
      "GENERAL",
      "MEDIA",
      "MEDICAL",
      "SCIENCE",
      "IT",
      "TRAVEL"
    ]
  }];
}

// An attachment returned on an order comment.
message Attachment {
  // Base64-encoded image bytes.
  string image = 1;
  // MIME type, e.g. "image/png".
  string type = 2;
  // Display name of the attachment.
  string name = 3;
  // Size in kilobytes.
  int32 weight = 4;
  // Pixel dimensions, e.g. "481x315".
  string size = 5;
}

// A comment on an order.
message Comment {
  int64 id = 1;
  google.protobuf.Timestamp time = 2;
  // Author role: CUSTOMER or TRANSLATOR.
  string role = 3 [(buf.validate.field).string = {
    in: ["CUSTOMER", "TRANSLATOR"]
  }];
  string text = 4;
  repeated Attachment attachments = 5;
}

// A full order record, as returned by GetOrder. Lighter listings (ListOrders,
// Translate) use the OrderSummary projection instead.
message Order {
  int64 id = 1;
  // Lifecycle status: QUEUE (deletable) or DONE.
  string status = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      in: ["QUEUE", "DONE"]
    }
  ];
  string source_language = 3;
  string target_language = 4;
  string source_text = 5;
  string target_text = 6;
  int32 volume = 7;
  double price = 8;
  Resource resource = 9;
  Context context = 10;
  repeated Comment comments = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp accepted_at = 13;
  google.protobuf.Timestamp completed_at = 14;
  optional string translator = 15;
}

// A lightweight order projection shared by the ListOrders and Translate
// responses. Field numbers are aligned with Order (same field -> same number),
// so the gaps below are intentional where the summary omits detail fields.
// `price` is always returned; `status`/`snippet` are set by ListOrders only,
// and proto3 omits them from the Translate JSON when unset. Because status is
// absent on the Translate projection, it is constrained but not required here
// (it is required on the full Order, which always carries it).
message OrderSummary {
  int64 id = 1;
  // Lifecycle status: QUEUE or DONE. Set by ListOrders; absent on Translate.
  optional string status = 2 [(buf.validate.field).string = {
    in: ["QUEUE", "DONE"]
  }];
  string source_language = 3;
  string target_language = 4;
  // Short preview of the source text.
  string snippet = 5;
  double price = 6;
  google.protobuf.Timestamp created_at = 7;
}

// Per-language-pair cost estimate produced by Calculate.
message Calculation {
  string source_language = 1;
  string target_language = 2;
  // Billable character volume.
  int32 volume = 3;
  // Estimated price in US dollars.
  double price = 4;
}

// Per-language-pair price produced by ListRates.
message Rate {
  string source_language = 1;
  string target_language = 2;
  // Rate per 1000 characters, in US dollars.
  double rate = 3;
}

// Comment supplied with a translation request (inbound counterpart of the
// `Comment` returned on an order).
message CommentInput {
  string text = 1;
  repeated AttachmentInput attachments = 2;
}

// Attachment supplied with a translation comment on submission (inbound
// counterpart of the `Attachment` returned on an order).
message AttachmentInput {
  // MIME type, e.g. "image/png".
  string type = 1 [(buf.validate.field).required = true];
  // Base64-encoded image bytes.
  string data = 2 [(buf.validate.field).required = true];
}

// ---------------------------------------------------------------------------
// Request / response messages
// ---------------------------------------------------------------------------

message GetAccountRequest {}

message GetAccountResponse {
  Account account = 1;
}

message ListOrdersRequest {
  // Sort by creation time: "asc" or "desc" (default).
  optional string sort = 1 [(buf.validate.field).string = {
    in: ["asc", "desc"]
  }];
  // Zero-based page index. Defaults to 0.
  optional int32 page = 2 [(buf.validate.field).int32.gte = 0];
  // Page size. Defaults to 20.
  optional int32 per_page = 3 [(buf.validate.field).int32.gte = 1];
}

message ListOrdersResponse {
  repeated OrderSummary orders = 1;
}

message GetOrderRequest {
  int64 id = 1 [(buf.validate.field).int64.gt = 0];
}

message GetOrderResponse {
  Order order = 1;
}

message DeleteOrderRequest {
  int64 id = 1 [(buf.validate.field).int64.gt = 0];
}

message DeleteOrderResponse {}

message CalculateRequest {
  string source_language = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      in: [
        "af", "ar", "az", "be", "bg", "bn", "ca", "cs", "da", "de", "el", "en",
        "es-ES", "es-MX", "et", "fa", "fi", "fr", "fr-CA", "he", "hi", "hr",
        "hu", "hy-AM", "id", "is", "it", "ja", "ka", "kk", "ko", "ky", "lt",
        "lv", "ml-IN", "ms", "my", "nl", "no", "pl", "pt-BR", "pt-PT", "ro",
        "ru", "sk", "sl", "sr", "sr-CS", "sv-SE", "ta", "tg", "th", "tl", "tr",
        "te", "uk", "ur-PK", "uz", "vi", "zh-CN", "zh-TW"
      ]
    }
  ];
  repeated string target_languages = 2 [
    (buf.validate.field).repeated = {
      min_items: 1
      items: {
        string: {
          in: [
            "af", "ar", "az", "be", "bg", "bn", "ca", "cs", "da", "de", "el",
            "en", "es-ES", "es-MX", "et", "fa", "fi", "fr", "fr-CA", "he", "hi",
            "hr", "hu", "hy-AM", "id", "is", "it", "ja", "ka", "kk", "ko", "ky",
            "lt", "lv", "ml-IN", "ms", "my", "nl", "no", "pl", "pt-BR", "pt-PT",
            "ro", "ru", "sk", "sl", "sr", "sr-CS", "sv-SE", "ta", "tg", "th",
            "tl", "tr", "te", "uk", "ur-PK", "uz", "vi", "zh-CN", "zh-TW"
          ]
        }
      }
    }
  ];
  Resource resource = 3 [(buf.validate.field).required = true];
}

message CalculateResponse {
  repeated Calculation calculations = 1;
}

message TranslateRequest {
  string source_language = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      in: [
        "af", "ar", "az", "be", "bg", "bn", "ca", "cs", "da", "de", "el", "en",
        "es-ES", "es-MX", "et", "fa", "fi", "fr", "fr-CA", "he", "hi", "hr",
        "hu", "hy-AM", "id", "is", "it", "ja", "ka", "kk", "ko", "ky", "lt",
        "lv", "ml-IN", "ms", "my", "nl", "no", "pl", "pt-BR", "pt-PT", "ro",
        "ru", "sk", "sl", "sr", "sr-CS", "sv-SE", "ta", "tg", "th", "tl", "tr",
        "te", "uk", "ur-PK", "uz", "vi", "zh-CN", "zh-TW"
      ]
    }
  ];
  repeated string target_languages = 2 [
    (buf.validate.field).repeated = {
      min_items: 1
      items: {
        string: {
          in: [
            "af", "ar", "az", "be", "bg", "bn", "ca", "cs", "da", "de", "el",
            "en", "es-ES", "es-MX", "et", "fa", "fi", "fr", "fr-CA", "he", "hi",
            "hr", "hu", "hy-AM", "id", "is", "it", "ja", "ka", "kk", "ko", "ky",
            "lt", "lv", "ml-IN", "ms", "my", "nl", "no", "pl", "pt-BR", "pt-PT",
            "ro", "ru", "sk", "sl", "sr", "sr-CS", "sv-SE", "ta", "tg", "th",
            "tl", "tr", "te", "uk", "ur-PK", "uz", "vi", "zh-CN", "zh-TW"
          ]
        }
      }
    }
  ];
  Resource resource = 3 [(buf.validate.field).required = true];
  optional Context context = 4;
  optional CommentInput comment = 5;
}

message TranslateResponse {
  // The submitted source text.
  string text = 1;
  Resource resource = 2;
  // Billable character volume.
  int32 volume = 3;
  // One order per target language, as the lightweight OrderSummary projection
  // (id, source_language, target_language, price, created_at; status/snippet
  // are omitted from the JSON here).
  repeated OrderSummary orders = 4;
}

message ListRatesRequest {}

message ListRatesResponse {
  repeated Rate rates = 1;
}
