syntax = "proto3";

package nitrotranslate.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "nitrotranslate/v1/common.proto";

// OrderService exposes listing, retrieval and deletion of orders.
service OrderService {
  // GET /orders — list orders, newest first by default, with pagination.
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse) {
    option (google.api.http) = {
      get: "/v1/orders"
      response_body: "orders"
    };
  }

  // GET /orders/<ID> — fetch a single order with its full details.
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse) {
    option (google.api.http) = {
      get: "/v1/orders/{id}"
      response_body: "order"
    };
  }

  // DELETE /orders/<ID> — remove an order (only while in QUEUE status).
  rpc DeleteOrder(DeleteOrderRequest) returns (DeleteOrderResponse) {
    option (google.api.http) = {delete: "/v1/orders/{id}"};
  }
}

// An attachment returned on an order comment.
message Attachment {
  // Base64-encoded image bytes.
  string image = 1;
  // MIME type, e.g. "image/png".
  string type = 2;
  // Display name of the attachment.
  string name = 3;
  // Size in kilobytes.
  int32 weight = 4;
  // Pixel dimensions, e.g. "481x315".
  string size = 5;
}

// A comment on an order.
message Comment {
  int32 id = 1;
  google.protobuf.Timestamp time = 2;
  // Author role: CUSTOMER or TRANSLATOR.
  string role = 3 [(buf.validate.field).string = {
    in: [
      "CUSTOMER",
      "TRANSLATOR"
    ]
  }];
  string text = 4;
  repeated Attachment attachments = 5;
}

// A full order record, as returned by GetOrder. Lighter listings (ListOrders,
// Translate) use the OrderSummary projection instead.
message Order {
  int32 id = 1;
  // Lifecycle status: QUEUE (deletable) -> PROGRESS -> DONE. REVISION is
  // re-entered from DONE when the customer reopens a completed order.
  string status = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      in: [
        "QUEUE",
        "PROGRESS",
        "DONE",
        "REVISION"
      ]
    }
  ];
  string source_language = 3;
  string target_language = 4;
  string source_text = 5;
  string target_text = 6;
  string snippet = 7;
  int32 volume = 8;
  double price = 9;
  Resource resource = 10;
  Context context = 11;
  repeated Comment comments = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp accepted_at = 14;
  google.protobuf.Timestamp completed_at = 15;
  optional string translator = 16;
}

// A lightweight order projection shared by the ListOrders and Translate
// responses. `price` is always returned; `status`/`snippet` are set by
// ListOrders only, and proto3 omits them from the Translate JSON when unset.
// Because status is absent on the Translate projection, it is constrained but
// not required here (it is required on the full Order, which always carries it).
message OrderSummary {
  int32 id = 1;
  // Lifecycle status: QUEUE -> PROGRESS -> DONE, with REVISION re-entered from
  // DONE. Set by ListOrders; absent on Translate.
  optional string status = 2 [(buf.validate.field).string = {
    in: [
      "QUEUE",
      "PROGRESS",
      "DONE",
      "REVISION"
    ]
  }];
  string source_language = 3;
  string target_language = 4;
  // Short preview of the source text. ListOrders only.
  string snippet = 5;
  // Order price in US dollars. Always returned.
  double price = 6;
  google.protobuf.Timestamp created_at = 7;
}

message ListOrdersRequest {
  // Sort by creation time: "asc" or "desc" (default).
  optional string sort = 1 [(buf.validate.field).string = {
    in: [
      "asc",
      "desc"
    ]
  }];
  // Zero-based page index. Defaults to 0.
  optional int32 page = 2 [(buf.validate.field).int32.gte = 0];
  // Page size. Defaults to 20.
  optional int32 per_page = 3 [(buf.validate.field).int32.gte = 1];
}

message ListOrdersResponse {
  repeated OrderSummary orders = 1;
}

message GetOrderRequest {
  int32 id = 1 [(buf.validate.field).int32.gt = 0];
}

message GetOrderResponse {
  Order order = 1;
}

message DeleteOrderRequest {
  int32 id = 1 [(buf.validate.field).int32.gt = 0];
}

message DeleteOrderResponse {}
