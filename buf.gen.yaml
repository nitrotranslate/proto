version: v2
managed:
  enabled: true
plugins:
  - remote: buf.build/community/sudorandom-connect-openapi:v0.25.7
    out: .
    opt:
      - content-types=json
      - only-googleapi-http
      - short-operation-ids
      - trim-unused-types
      - with-proto-names
      - without-default-tags
      - path=openapi.yaml
